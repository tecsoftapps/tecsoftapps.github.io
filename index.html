<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apps and Stickers</title>
    <style>
        body {
            font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px;text-align: center;
        }
        .container {
	   display: flex; flex-wrap: wrap; justify-content: center; gap: 20px;
        }
        .app-card {
            background: white; padding: 10px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 250px;  text-align: center;
        }
        .app-card img {
            width: 100%; border-radius: 10px; cursor: pointer; transition: transform 0.2s ease-in-out;
        }
        .app-card img:hover {
            transform: scale(1.05);
        }
        .app-card h3 {
            font-size: 18px; margin: 10px 0 5px;
        }
        .app-card p {
            color: #555; font-size: 14px;
        }
    </style>    
</head>
<body>

    <h1>Apps and Stickers</h1>
	<a href="https://tecsoftapps.github.io/privacypolicy" style="color: #555; text-decoration: none; margin-bottom: 20px; display: block;">View Our Privacy Policy</a>

    <div class="container" id="appContainer"></div>

    <div style="max-width: 500px; margin: 40px auto 0 auto; background: white; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.08); padding: 24px 20px 18px 20px; color: #333; font-size: 16px;">
      <h2 style="margin-top: 0; font-size: 22px; color: #222;">Contact Us</h2>
      <p style="margin: 0;">If you have any questions or feedback, feel free to reach out at <a href="mailto:rubilyndocs@gmail.com" style="color: #0073e6; text-decoration: none;">rubilyndocs@gmail.com</a>.</p>
    </div>

    <script type="module">
        import { apps } from './apps.js';

        // Sort apps by order (items without an order go last)
        apps.sort((a, b) => (a.order ?? Infinity) - (b.order ?? Infinity));

        const container = document.getElementById("appContainer");

        apps.forEach(app => {
            const card = document.createElement("div");
            card.className = "app-card";

            card.innerHTML = `
                <img src="${app.artwork}" alt="${app.name}" onclick="window.open('${app.url}', '_blank')">
                <h3>${app.name}</h3>
                <p>${app.genre}</p>
            `;

            container.appendChild(card);
        });
    </script>

</body>
</html>
